    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...args)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(args)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="rSY5RlUVDLMimwAxCK-eV";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})()
    </script>
  </body>

</html>
    <script>
      // Add pulsing animation and tooltip to chat widget button
      const setupChatWidget = () => {
        const chatButton = document.getElementById('chatbase-bubble-button');
        if (chatButton) {
          chatButton.classList.add('pulse-widget', 'chat-widget-tooltip');
          chatButton.setAttribute('data-tooltip', 'Try our AI Dental Assistant');
        } else {
          // Retry if button not found yet
          setTimeout(setupChatWidget, 500);
        }
      };
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupChatWidget);
      } else {
        setupChatWidget();
      }
    </script>
