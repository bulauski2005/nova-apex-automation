<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Novapex Automation</title>
    <meta name="robots" content="noindex" />
    <style>html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;background:#f3f4f6;color:#111}</style>
  </head>
  <body>
    <div>
      <h2>Loading app...</h2>
      <p>If you are not redirected, <a id="reload" href="/">click here</a>.</p>
    </div>

    <script>
      // Fetch the app shell (index.html) and replace the document so the SPA router can handle the path.
      (function(){
        var indexPath = '/index.html';
        // Attempt to fetch the app shell relative to the current origin
        fetch(indexPath).then(function(resp){
          if(!resp.ok) { throw new Error('index not found'); }
          return resp.text();
        }).then(function(html){
          document.open();
          document.write(html);
          document.close();
          // Keep current URL so SPA router can read it
          try { history.replaceState({}, '', location.pathname + location.search + location.hash); } catch(e) {}
        }).catch(function(){
          var reload = document.getElementById('reload');
          if (reload) reload.style.display = 'inline';
        });
      })();
    </script>
  </body>
</html>
